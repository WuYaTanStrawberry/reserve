<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>舞夜天高架草莓園預約</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/material_red.css">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/zh.js"></script>
  <style>
    :root { --main: #e63946; --bg: #fdf2f4; }
    body { font-family: -apple-system, sans-serif; background: var(--bg); padding: 10px; margin: 0; }
    .container { background: white; max-width: 100%; margin: auto; border-radius: 20px; padding: 15px; box-sizing: border-box; box-shadow: 0 5px 15px rgba(230,57,70,0.1); }
    h2 { color: var(--main); text-align: center; font-size: 1.4rem; margin: 10px 0 5px 0; }
    .subtitle { text-align: center; color: #888; font-size: 12px; margin-bottom: 15px; }
    
    /* 🍓 載入動畫遮罩 */
    #loading-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255, 255, 255, 0.9); z-index: 9999;
      flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(3px);
    }
    .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid var(--main); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loading-text { margin-top: 15px; color: var(--main); font-weight: bold; font-size: 18px; }

    /* 🍓 日曆高對比與刪除線樣式 */
    .calendar-wrapper { display: flex; justify-content: center; margin-bottom: 15px; overflow: hidden; }
    .flatpickr-calendar { transform: scale(0.95); transform-origin: top center; border: 2px solid var(--main) !important; }
    
    .flatpickr-day.flatpickr-disabled, .flatpickr-day.flatpickr-disabled:hover {
      color: #ccc !important; text-decoration: line-through; background: transparent !important; border-color: transparent !important;
    }
    .flatpickr-day:not(.flatpickr-disabled) { color: #000 !important; font-weight: 800 !important; font-size: 16px !important; }
    .flatpickr-day.today { border-color: var(--main) !important; }
    .flatpickr-day.selected { background: var(--main) !important; color: white !important; border: none !important; }

    .step-box { border-left: 4px solid var(--main); padding-left: 12px; margin-bottom: 15px; }
    .step-title { font-weight: bold; color: #333; display: block; margin-bottom: 6px; font-size: 14px; }
    input, select { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 10px; font-size: 16px; box-sizing: border-box; background: #fafafa; margin-bottom: 10px; }
    .btn:disabled { background: #ccc !important; }
    .btn { width: 100%; background: var(--main); color: white; border: none; padding: 16px; border-radius: 12px; font-size: 18px; font-weight: bold; transition: 0.3s; }
 /* 🍓 只有當公告區塊顯示時，才把日曆藏起來 */
#closed-announcement[style*="display: block"] ~ .flatpickr-calendar {display: none !important;}
/* 確保日曆預設是可見的 */
.flatpickr-calendar {display: block;}
  </style>
</head>
<body>
  
<div id="closed-announcement" style="display: none; text-align: center; padding: 60px 20px; background-color: #fffaf0; border-radius: 20px; margin: 20px;">
    <h2 style="color: #E63946;">🍓 預約準備中</h2>
    <p style="font-size: 16px; color: #555;">舞夜天草莓園感謝您的支持！</p>
    <div style="background: #fff; padding: 20px; border-radius: 15px; border: 2px dashed #ffb7b7; margin: 25px 0;">
        <p style="font-weight: bold; margin-bottom: 5px;">🔓 本週開放預約時間：</p>
        <p style="color: #D62828; font-size: 22px; font-weight: bold;">每週一 中午 12:00</p>
    </div>
    <p style="font-size: 14px; color: #888;">現在是果園整理時間，請準時再來喔！🦆</p>
</div>

<div id="booking-form">
    <h3>請選擇預約日期</h3>
    <input type="text" id="datePicker" placeholder="點擊選擇日期">
    
    <div id="step2">...</div>
</div>
  
<div id="booking-form">
    </div>
<div id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text">🍓 正在為您預約中...</div>
</div>

<div class="container">
  <h2>🍓 舞夜天高架草莓園</h2>
  <div class="subtitle">苗栗大湖 | 採草莓預約</div>
  
  <div class="step-box">
    <span class="step-title">1. 選擇日期 (僅開放本週)</span>
    <div class="calendar-wrapper"><input type="text" id="datePicker" style="display:none;"></div>
  </div>

  <div id="step2" class="step-box" style="display:none;">
    <span class="step-title">2. 選擇時段</span>
    <select id="time" onchange="document.getElementById('step3').style.display='block'"></select>
  </div>

  <div id="step3" style="display:none;">
    <div class="step-box">
      <span class="step-title">3. 基本資料</span>
      <input type="text" id="name" placeholder="預約人姓名">
      <input type="tel" id="phone" placeholder="手機號碼">
      <div style="font-size:12px; color:#777;">🚗 預約汽車數量 (機車請填 0)：</div>
      <input type="number" id="cars" value="1" min="0" max="10">
    </div>
    <button class="btn" id="submitBtn" onclick="submitBooking()">確認預約送出</button>
  </div>
</div>

<script>
  // 🍓 設定區
  const MY_LIFF_ID = "2009638018-NaOpldtQ"; 
  const MY_GAS_URL = "https://script.google.com/macros/s/AKfycbwLLI5Tg3lgdvkZk9DBhevyhmqf-F5vfzChbPOLZdJV3DD5O8div1QhF2EaU6BuIwYDgA/exec"; 

  // --- 1. LIFF 啟動 ---
  async function initLiff() {
    try {
      await liff.init({ liffId: MY_LIFF_ID });
      if (!liff.isLoggedIn()) {
        liff.login();
      } else {
        console.log("LIFF 已登入");
      }
    } catch (error) {
      console.error("LIFF 啟動失敗：" + error.message);
    }
  }
  window.addEventListener('load', initLiff);

  // --- 2. 頁面顯示邏輯與日曆初始化 ---
  document.addEventListener("DOMContentLoaded", function() {
    const announcement = document.getElementById('closed-announcement');
    const form = document.getElementById('booking-form');
    const msgText = document.getElementById('announcement-text');

    const now = new Date();
    const day = now.getDay();
    const hour = now.getHours();

    // 🍓 產季狀態控制：測試時請改 false，產季結束請改 true
    const isOffSeason = false; 
    const isMondayWaiting = (day === 1 && hour < 12);

    if (isOffSeason) {
      form.style.display = "none";
      announcement.style.display = "block";
      if(msgText) msgText.innerHTML = "🍓 本季採果已圓滿結束<br>期待 11 月再與大家見面！🦆";
    } 
    else if (isMondayWaiting) {
      form.style.display = "none";
      announcement.style.display = "block";
      if(msgText) msgText.innerHTML = "🍓 預約準備中<br>本週預約將於「週一中午 12:00」準時開放！";
    } 
    else {
      form.style.display = "block";
      announcement.style.display = "none";
      
      // 確保容器顯示後再初始化日曆
      setTimeout(() => {
        initMyCalendar();
      }, 50);
    }
  });

  // --- 3. 日曆設定函式 ---
  function initMyCalendar() {
    const input = document.getElementById("datePicker");
    if (!input) return;

    flatpickr("#datePicker", {
      locale: "zh",
      inline: true,
      minDate: "today",
      // 禁止選擇週一(1)與週二(2)
      enable: [
        function(date) {
          return date.getDay() !== 1 && date.getDay() !== 2;
        }
      ],
      onChange: (selectedDates, dateStr) => {
        if (dateStr) fetchSlots(dateStr);
      }
    });
  }

  // --- 4. 抓取剩餘時段 ---
  async function fetchSlots(dateStr) {
    const timeSel = document.getElementById('time');
    document.getElementById('step2').style.display = 'block';
    timeSel.innerHTML = '<option>🔍 查詢車位中...</option>';
    
    const res = await fetch(`${MY_GAS_URL}?queryDate=${dateStr}`);
    const data = await res.json();
    
    timeSel.innerHTML = '<option value="">請選擇時段</option>';
    
    const now = new Date();
    const todayStr = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')}`;
    const currentHour = now.getHours();
    const timeSlots = ["08:00","09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00"];

    timeSlots.forEach(t => {
      const slotHour = parseInt(t.split(":")[0]);
      const rem = data[t].remaining;
      const isPast = (dateStr === todayStr && slotHour <= currentHour);

      if (!isPast) {
        const opt = new Option(`${t} (${rem <= 0 ? '❌滿位' : '🚗剩'+rem})`, t);
        opt.disabled = (rem <= 0); 
        timeSel.add(opt);
      }
    });
    
    if (timeSel.options.length <= 1) {
      timeSel.innerHTML = '<option value="">今日預約已截止，請選其他日期</option>';
    }
  }

  // --- 5. 送出預約 ---
  async function submitBooking() {
    const name = document.getElementById('name').value;
    const phone = document.getElementById('phone').value;
    const date = document.getElementById('datePicker').value;
    const time = document.getElementById('time').value;
    const cars = document.getElementById('cars').value;
    const btn = document.getElementById('submitBtn');
    const overlay = document.getElementById('loading-overlay');

    if(!name || !phone || !date || !time) return alert("請填寫完整資訊！");

    btn.disabled = true;
    overlay.style.display = "flex";

    try {
      const profile = await liff.getProfile();
      await fetch(MY_GAS_URL, {
        method: "POST",
        body: JSON.stringify({ userId: profile.userId, name, phone, date, time, cars })
      });
      alert("🍓 預約成功！\n期待您的光臨。");
      window.location.reload();
    } catch (e) {
      alert("🍓 預約成功！\n請回 LINE 查看確認訊息。");
      window.location.reload();
    }
  }
</script>
</body>
</html>
